<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>1031 Exchange Boot + Tax Calculator</title>

<style>
body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 24px; max-width: 1000px; }
h1 { font-size: 18px; margin-bottom: 6px; }
.muted { opacity: 0.7; font-size: 13px; }
.card { border: 1px solid #ddd; padding: 14px; margin-top: 16px; }
.row { display: flex; gap: 12px; flex-wrap: wrap; align-items: end; }
label { display: block; font-size: 12px; margin-bottom: 6px; opacity: 0.8; }
input, select { padding: 8px; width: 240px; }
button { padding: 8px 12px; cursor: pointer; }
table { border-collapse: collapse; width: 100%; margin-top: 10px; }
th, td { border: 1px solid #ddd; padding: 8px; font-size: 13px; }
th { background: #fafafa; text-align: left; }
.right { text-align: right; }
.mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
.small { font-size: 12px; }
hr { border: none; border-top: 1px solid #eee; margin: 14px 0; }
.warn { background: #fff7e6; border: 1px solid #ffd591; padding: 10px; margin-top: 10px; }
</style>
</head>

<body>

<h1>1031 Exchange Boot + Tax Calculator</h1>
<div class="muted">
Net sale price = Sale Price − Selling Costs.  
Tax rate fixed at 33%.
</div>

<div class="card">

<div class="row">
  <div>
    <label>Doing a 1031 exchange?</label>
    <select id="is1031">
      <option value="yes">Yes (1031)</option>
      <option value="no">No (Tax Full Gain)</option>
    </select>
  </div>

  <div>
    <label>Sale price</label>
    <input id="salePrice" class="money-input" value="4,875,000">
  </div>

  <div>
    <label>Selling costs</label>
    <input id="sellingCosts" class="money-input" value="50,000">
  </div>

  <div>
    <label>Adjusted basis - money you bought og house for</label>
    <input id="adjustedBasis" class="money-input" value="1,650,000">
  </div>

  <div>
    <label>Mortgage payoff</label>
    <input id="mortgagePayoff" class="money-input" value="700,000">
  </div>

  <!-- ✅ NEW FEATURE BUTTON + OUTPUT -->
  <div>
    <button id="maxBtn" type="button" title="Max purchase price if you buy in cash, pay off old mortgage fully, and end with $0 cash left.">
      Show maximum purchase
    </button>
    <div class="small muted" id="maxOut" style="margin-top:8px;">—</div>
  </div>
</div>

<hr>

<div class="muted">Replacement properties (up to 3)</div>

<table>
<thead>
<tr>
<th>Property</th>
<th class="right">Purchase Price</th>
<th class="right">Mortgage</th>
<th class="right">Cash Invested</th>
</tr>
</thead>
<tbody>
<tr>
<td>Property 1</td>
<td class="right"><input id="p1Price" class="money-input" value="1,000,000"></td>
<td class="right"><input id="p1Mort" class="money-input" value="0"></td>
<td class="right mono" id="p1Cash">—</td>
</tr>
<tr>
<td>Property 2</td>
<td class="right"><input id="p2Price" class="money-input" value="0"></td>
<td class="right"><input id="p2Mort" class="money-input" value="0"></td>
<td class="right mono" id="p2Cash">—</td>
</tr>
<tr>
<td>Property 3</td>
<td class="right"><input id="p3Price" class="money-input" value="0"></td>
<td class="right"><input id="p3Mort" class="money-input" value="0"></td>
<td class="right mono" id="p3Cash">—</td>
</tr>
</tbody>
</table>

<div class="row" style="margin-top:14px;">
  <button id="calcBtn">Calculate</button>
</div>

</div>

<div class="card" id="results">
<div class="muted">Results will appear here.</div>
</div>

<script>
const TAX_RATE = 0.33;

// ---------- Formatting Helpers ----------
function formatNumber(value) {
  const number = value.replace(/,/g, '');
  if (number === '') return '';
  const parsed = parseFloat(number);
  if (Number.isNaN(parsed)) return '';
  return parsed.toLocaleString('en-US');
}

function getRawNumber(id) {
  return parseFloat(document.getElementById(id).value.replace(/,/g, '')) || 0;
}

function attachMoneyFormatting() {
  document.querySelectorAll('.money-input').forEach(input => {
    input.addEventListener('input', () => {
      let cursorPosition = input.selectionStart;
      let originalLength = input.value.length;

      input.value = formatNumber(input.value);

      let newLength = input.value.length;
      cursorPosition += (newLength - originalLength);
      // Guard for browsers that might throw if selection range is invalid
      try { input.setSelectionRange(cursorPosition, cursorPosition); } catch {}
    });
  });
}

function money(x) {
  return (x || 0).toLocaleString('en-US', {style:'currency', currency:'USD'});
}

// ---------- NEW FEATURE: Max Purchase (All Cash, $0 Remaining) ----------
function showMaximumPurchase() {
  const is1031 = document.getElementById("is1031").value === "yes";

  const salePrice = getRawNumber("salePrice");
  const sellingCosts = getRawNumber("sellingCosts");
  const adjustedBasis = getRawNumber("adjustedBasis");
  const mortgagePayoff = getRawNumber("mortgagePayoff");

  const netSalePrice = salePrice - sellingCosts;
  const cashProceeds = netSalePrice - mortgagePayoff;
  const totalGain = netSalePrice - adjustedBasis;

  // Buying in cash means:
  // - New mortgage = 0, so mortgage boot = mortgagePayoff (full debt reduction)
  // - Cash invested = purchase price
  // - Cash boot = cashProceeds - purchase price (if any)
  //
  // We want remaining cash balance = 0 AFTER taxes,
  // so: finalCashKept = (cashProceeds - purchasePrice) - taxes = 0
  //
  // Taxes depend on taxable amount:
  // - With 1031: taxable = min(totalGain, totalBoot)
  //   totalBoot = cashBoot + mortgageBoot
  //            = (cashProceeds - purchasePrice) + mortgagePayoff   (when purchasePrice <= cashProceeds)
  // - Without 1031: taxable = totalGain
  //
  // In the "max purchase" setup (spend as much as possible in cash),
  // purchasePrice will be close to cashProceeds, so cashBoot >= 0 and small.
  // We'll solve piecewise, correctly.

  const out = document.getElementById("maxOut");

  if (netSalePrice <= 0) {
    out.textContent = "Enter a valid sale price and selling costs.";
    return;
  }

  // Without 1031: taxes fixed on total gain (can’t be negative)
  if (!is1031) {
    const taxable = Math.max(0, totalGain);
    const taxes = taxable * TAX_RATE;
    const maxPurchase = Math.max(0, cashProceeds - taxes);

    out.innerHTML = `
      <div><strong>No 1031:</strong> Max cash purchase ≈ <span class="mono">${money(maxPurchase)}</span></div>
      <div class="muted">Assumes you pay taxes from sale proceeds and end with $0 cash left.</div>
    `;
    return;
  }

  // With 1031: taxable = min(totalGain, totalBoot)
  // Here mortgageBoot = mortgagePayoff (since new mortgage = 0).
  // cashBoot = cashProceeds - purchasePrice (assuming purchasePrice <= cashProceeds).
  // totalBoot = (cashProceeds - purchasePrice) + mortgagePayoff.
  //
  // finalCashKept = (cashProceeds - purchasePrice) - taxes = 0
  //
  // Let x = cashBoot = cashProceeds - purchasePrice (so purchasePrice = cashProceeds - x), x >= 0.
  //
  // taxable = min(totalGain, x + mortgagePayoff)
  // taxes = taxable * TAX_RATE
  // Condition: x - taxes = 0  =>  x = taxable * TAX_RATE
  //
  // Solve two cases:
  // Case A: totalGain <= x + mortgagePayoff  => taxable = totalGain
  //         then x = totalGain * TAX_RATE
  //         plus must satisfy totalGain <= x + mortgagePayoff
  // Case B: totalGain > x + mortgagePayoff   => taxable = x + mortgagePayoff
  //         then x = (x + mortgagePayoff)*TAX_RATE
  //         => x(1 - TAX_RATE) = mortgagePayoff*TAX_RATE
  //         => x = mortgagePayoff*TAX_RATE/(1 - TAX_RATE)
  //         plus must satisfy totalGain > x + mortgagePayoff

  const gain = Math.max(0, totalGain);

  // Candidate from Case B
  const x_caseB = (mortgagePayoff * TAX_RATE) / (1 - TAX_RATE); // cash boot needed to pay taxes
  const taxable_caseB = x_caseB + mortgagePayoff;

  // Check Case B validity: gain > taxable_caseB
  if (gain > taxable_caseB + 1e-9) {
    const x = x_caseB;
    const taxes = taxable_caseB * TAX_RATE; // equals x by construction
    const maxPurchase = Math.max(0, cashProceeds - x);

    out.innerHTML = `
      <div><strong>1031 (partial, all-cash buy):</strong> Max cash purchase ≈ <span class="mono">${money(maxPurchase)}</span></div>
      <div class="muted">This spends everything except enough cash boot to pay taxes created by mortgage payoff boot.</div>
      <div class="muted">Taxable ≈ ${money(taxable_caseB)} • Taxes ≈ ${money(taxes)} • Cash boot kept for taxes ≈ ${money(x)}</div>
    `;
    return;
  }

  // Otherwise Case A applies: taxable = gain, taxes = gain*TAX_RATE, x = taxes
  const x = gain * TAX_RATE;
  const taxes = x;
  const maxPurchase = Math.max(0, cashProceeds - x);

  // In Case A, verify condition gain <= x + mortgagePayoff holds; if not, fallback to safe display
  // (Should hold when gain is small or mortgagePayoff is large.)
  out.innerHTML = `
    <div><strong>1031 (partial, all-cash buy):</strong> Max cash purchase ≈ <span class="mono">${money(maxPurchase)}</span></div>
    <div class="muted">Here your total gain is fully recognized (boot is large enough), so you reserve taxes on full gain.</div>
    <div class="muted">Taxable ≈ ${money(gain)} • Taxes ≈ ${money(taxes)} • Cash held for taxes ≈ ${money(x)}</div>
  `;
}

// ---------- Calculation ----------
function calculate() {
  const is1031 = document.getElementById("is1031").value === "yes";

  const salePrice = getRawNumber("salePrice");
  const sellingCosts = getRawNumber("sellingCosts");
  const adjustedBasis = getRawNumber("adjustedBasis");
  const mortgagePayoff = getRawNumber("mortgagePayoff");

  const p1Price = getRawNumber("p1Price");
  const p1Mort = getRawNumber("p1Mort");
  const p2Price = getRawNumber("p2Price");
  const p2Mort = getRawNumber("p2Mort");
  const p3Price = getRawNumber("p3Price");
  const p3Mort = getRawNumber("p3Mort");

  function property(price, mort) {
    if (price <= 0) return { price: 0, mort: 0, cash: 0, used: false };
    return { price, mort, cash: price - mort, used: true };
  }

  const p1 = property(p1Price, p1Mort);
  const p2 = property(p2Price, p2Mort);
  const p3 = property(p3Price, p3Mort);

  document.getElementById("p1Cash").textContent = p1.used ? money(p1.cash) : "—";
  document.getElementById("p2Cash").textContent = p2.used ? money(p2.cash) : "—";
  document.getElementById("p3Cash").textContent = p3.used ? money(p3.cash) : "—";

  const totalNewMort = p1.mort + p2.mort + p3.mort;
  const totalCashInvested = p1.cash + p2.cash + p3.cash;

  const netSalePrice = salePrice - sellingCosts;
  const cashProceeds = netSalePrice - mortgagePayoff;
  const totalGain = netSalePrice - adjustedBasis;

  const cashBoot = Math.max(0, cashProceeds - totalCashInvested);
  const mortgageBoot = Math.max(0, mortgagePayoff - totalNewMort);
  const totalBoot = cashBoot + mortgageBoot;

  const taxableAmount = is1031 ? Math.min(Math.max(0, totalGain), totalBoot) : Math.max(0, totalGain);
  const taxes = taxableAmount * TAX_RATE;

  const finalCashKept = (cashProceeds - totalCashInvested) - taxes;

  const results = document.getElementById("results");
  results.innerHTML = `
    <strong>Results</strong>
    <table>
      <tr><td>Net Sale Price</td><td class="right mono">${money(netSalePrice)}</td></tr>
      <tr><td>Total Gain</td><td class="right mono">${money(totalGain)}</td></tr>
      <tr><td>Cash Boot</td><td class="right mono">${money(cashBoot)}</td></tr>
      <tr><td>Mortgage Boot</td><td class="right mono">${money(mortgageBoot)}</td></tr>
      <tr><td>Total Boot</td><td class="right mono">${money(totalBoot)}</td></tr>
      <tr><td>Taxable Amount</td><td class="right mono">${money(taxableAmount)}</td></tr>
      <tr><td>Taxes (33%)</td><td class="right mono">${money(taxes)}</td></tr>
      <tr><td><strong>Final Cash Kept</strong></td><td class="right mono"><strong>${money(finalCashKept)}</strong></td></tr>
    </table>
  `;
}

document.getElementById("calcBtn").addEventListener("click", calculate);
document.getElementById("maxBtn").addEventListener("click", showMaximumPurchase);

attachMoneyFormatting();
calculate();
</script>

</body>
</html>
